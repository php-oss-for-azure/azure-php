on:
  pull_request:
  workflow_dispatch: ~

name: Azure Infrastructure Tests

permissions:
  id-token: write
  contents: read

jobs:
  azure-tests:
    name: Azure Tests - PHP ${{ matrix.php-version }}

    environment: azure-testing

    strategy:
      fail-fast: false
      matrix:
        operating-system:
          - "ubuntu-latest"
        php-version:
          - "8.2"
          - "8.3"
          - "8.4"
          - "8.5"

    runs-on: ${{ matrix.operating-system }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup node for the mock server
        uses: actions/setup-node@v5

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_INFRA_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_INFRA_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_INFRA_SUBSCRIPTION_ID }}

      - name: Deploy Azure Infrastructure
        id: deploy
        run: |
          RG_NAME="rg-storage-test-php${{ matrix.php-version }}-${{ github.run_id }}"
          echo "resource_group=${RG_NAME}" >> $GITHUB_OUTPUT

          az deployment sub create \
            --name "deploy-${{ github.run_id }}-php${{ matrix.php-version }}" \
            --location eastus \
            --template-file infra/main.bicep \
            --parameters resourceGroupName="${RG_NAME}" \
            --output json > deployment-output.json

          # Extract connection strings from outputs
          echo "AZURE_STORAGE_CONNECTION_STRING=$(jq -r '.properties.outputs.connection_string.value' deployment-output.json)" >> $GITHUB_ENV
          echo "AZURE_STORAGE_CONNECTION_STRING_PUBLIC=$(jq -r '.properties.outputs.connection_string_public.value' deployment-output.json)" >> $GITHUB_ENV
          echo "AZURE_STORAGE_CONNECTION_STRING_SOFT_DELETES=$(jq -r '.properties.outputs.connection_string_soft_deletes.value' deployment-output.json)" >> $GITHUB_ENV
          echo "AZURE_STORAGE_CONNECTION_STRING_VERSIONS=$(jq -r '.properties.outputs.connection_string_versions.value' deployment-output.json)" >> $GITHUB_ENV
          echo "AZURE_STORAGE_CONNECTION_STRING_SOFT_DELETES_VERSIONS=$(jq -r '.properties.outputs.connection_string_soft_deletes_versions.value' deployment-output.json)" >> $GITHUB_ENV
          echo "AZURE_STORAGE_FILE_SHARE_NAME=$(jq -r '.properties.outputs.file_share_name.value' deployment-output.json)" >> $GITHUB_ENV
          echo "AZURE_STORAGE_FILE_SHARE_ACCOUNT_NAME=$(jq -r '.properties.outputs.file_share_storage_account_name.value' deployment-output.json)" >> $GITHUB_ENV
          echo "AZURE_STORAGE_FILE_SHARE_ACCOUNT_KEY=$(jq -r '.properties.outputs.file_share_storage_account_key.value' deployment-output.json)" >> $GITHUB_ENV
          echo "AZURE_STORAGE_FILE_SHARE_SMB_PATH=$(jq -r '.properties.outputs.file_share_smb_path.value' deployment-output.json)" >> $GITHUB_ENV

      - name: Mount Azure File Share
        run: |
          sudo apt-get update
          sudo apt-get install -y cifs-utils

          sudo mkdir -p /etc/smbcredentials
          CREDENTIAL_FILE="/etc/smbcredentials/${AZURE_STORAGE_FILE_SHARE_ACCOUNT_NAME}.cred"

          printf 'username=%s\npassword=%s\n' \
            "${AZURE_STORAGE_FILE_SHARE_ACCOUNT_NAME}" \
            "${AZURE_STORAGE_FILE_SHARE_ACCOUNT_KEY}" \
            | sudo tee "${CREDENTIAL_FILE}" > /dev/null

          sudo chmod 600 "${CREDENTIAL_FILE}"
          sudo mkdir -p /mnt/azure-file-share
          sudo mount -t cifs "${AZURE_STORAGE_FILE_SHARE_SMB_PATH}" /mnt/azure-file-share \
            -o "credentials=${CREDENTIAL_FILE},serverino,nosharesock,actimeo=30,mfsymlinks,dir_mode=0777,file_mode=0777,vers=3.1.1"

          echo "AZURE_STORAGE_FILE_SHARE_PATH=/mnt/azure-file-share" >> $GITHUB_ENV

      - name: Install PHP with extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: curl json
          coverage: none

      - name: Download dependencies
        run: composer install --no-interaction --no-progress --optimize-autoloader

      - name: Run tests
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_IDENTITY_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_IDENTITY_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_IDENTITY_CLIENT_SECRET }}
        run: ./vendor/bin/phpunit

      - name: Unmount Azure File Share
        if: always()
        run: sudo umount /mnt/azure-file-share || true

      - name: Destroy Azure Infrastructure
        if: always()
        run: |
          az group delete \
            --name "${{ steps.deploy.outputs.resource_group }}" \
            --yes \
            --no-wait
