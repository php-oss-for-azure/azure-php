name: Push Subtrees

on:
  push:
    tags:
      - storage-common-*
      - storage-blob-*
      - storage-blob-flysystem-*
      - storage-blob-laravel-*
      - storage-blob-flysystem-bundle-*
      - storage-queue-*
      - storage-queue-laravel-*
      - storage-file-share-*
      - identity-*
      - docs-*

jobs:
  push-subtrees:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - prefix: src/Storage/Common
            tag_prefix: storage-common
            repo: Azure-OSS/azure-storage-common-php
            secret: DEPLOY_KEY_COMMON
            changelog: src/Storage/Common/CHANGELOG.md
          - prefix: src/Storage/Blob
            tag_prefix: storage-blob
            repo: Azure-OSS/azure-storage-blob-php
            secret: DEPLOY_KEY_BLOB
            changelog: src/Storage/Blob/CHANGELOG.md
          - prefix: src/Storage/BlobFlysystem
            tag_prefix: storage-blob-flysystem
            repo: Azure-OSS/azure-storage-blob-flysystem-php
            secret: DEPLOY_KEY_BLOB_FLYSYSTEM
            changelog: src/Storage/BlobFlysystem/CHANGELOG.md
          - prefix: src/Storage/BlobLaravel
            tag_prefix: storage-blob-laravel
            repo: Azure-OSS/azure-storage-blob-laravel-php
            secret: DEPLOY_KEY_BLOB_LARAVEL
            changelog: src/Storage/BlobLaravel/CHANGELOG.md
          - prefix: src/Storage/BlobFlysystemBundle
            tag_prefix: storage-blob-flysystem-bundle
            repo: Azure-OSS/azure-storage-blob-flysystem-bundle-php
            secret: DEPLOY_KEY_BLOB_FLYSYSTEM_BUNDLE
            changelog: src/Storage/BlobFlysystemBundle/CHANGELOG.md
          - prefix: src/Storage/Queue
            tag_prefix: storage-queue
            repo: Azure-OSS/azure-storage-queue-php
            secret: DEPLOY_KEY_QUEUE
            changelog: src/Storage/Queue/CHANGELOG.md
          - prefix: src/Storage/QueueLaravel
            tag_prefix: storage-queue-laravel
            repo: Azure-OSS/azure-storage-queue-laravel-php
            secret: DEPLOY_KEY_QUEUE_LARAVEL
            changelog: src/Storage/QueueLaravel/CHANGELOG.md
          - prefix: src/Storage/File/Share
            tag_prefix: storage-file-share
            repo: Azure-OSS/azure-storage-file-share-php
            secret: DEPLOY_KEY_FILE_SHARE
            changelog: src/Storage/File/Share/CHANGELOG.md
          - prefix: src/Identity
            tag_prefix: identity
            repo: Azure-OSS/azure-identity-php
            secret: DEPLOY_KEY_IDENTITY
            changelog: src/Identity/CHANGELOG.md
          - prefix: docs
            tag_prefix: docs
            repo: Azure-OSS/azure-oss.github.io
            secret: DEPLOY_KEY_DOCS
            changelog: ""
    steps:
      - name: Match package tag
        id: release
        env:
          TAG_PREFIX: ${{ matrix.tag_prefix }}
        run: |
          VERSION=${GITHUB_REF_NAME#"$TAG_PREFIX-"}

          if [[ "$GITHUB_REF_NAME" != "$TAG_PREFIX-"* ]] || [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "matched=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "matched=true" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "split_tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout monorepo
        if: steps.release.outputs.matched == 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract release notes
        if: steps.release.outputs.matched == 'true' && matrix.changelog != ''
        env:
          CHANGELOG_PATH: ${{ matrix.changelog }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          php tools/release/extract-changelog-section.php "$CHANGELOG_PATH" "$VERSION" > release-notes.md
          test -s release-notes.md

      - name: Cache splitsh-lite
        if: steps.release.outputs.matched == 'true'
        id: cache-splitsh
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/splitsh-lite
          key: splitsh-lite-v1.0.1

      - name: Install splitsh-lite
        if: steps.release.outputs.matched == 'true' && steps.cache-splitsh.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/splitsh/lite/releases/download/v1.0.1/lite_linux_amd64.tar.gz
          tar -zxf lite_linux_amd64.tar.gz
          chmod +x splitsh-lite
          sudo mv splitsh-lite /usr/local/bin/

      - name: Setup SSH and push
        if: steps.release.outputs.matched == 'true'
        env:
          SSH_KEY: ${{ secrets[matrix.secret] }}
          SPLIT_TAG: ${{ steps.release.outputs.split_tag }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          git config --global user.name "github-actions"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          SHA=$(splitsh-lite --prefix=${{ matrix.prefix }})
          git push --atomic git@github.com:${{ matrix.repo }}.git \
            +$SHA:refs/heads/main \
            $SHA:refs/tags/$SPLIT_TAG

      - name: Create GitHub Release
        if: steps.release.outputs.matched == 'true' && matrix.changelog != ''
        env:
          RELEASE_BOT_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
          FALLBACK_GITHUB_TOKEN: ${{ github.token }}
          SPLIT_REPO: ${{ matrix.repo }}
          SPLIT_TAG: ${{ steps.release.outputs.split_tag }}
        run: |
          export GH_TOKEN="${RELEASE_BOT_TOKEN:-$FALLBACK_GITHUB_TOKEN}"

          if gh release view "$SPLIT_TAG" --repo "$SPLIT_REPO" >/dev/null 2>&1; then
            echo "Release $SPLIT_TAG already exists in $SPLIT_REPO; skipping."
            exit 0
          fi

          gh release create "$SPLIT_TAG" \
            --repo "$SPLIT_REPO" \
            --title "$SPLIT_TAG" \
            --notes-file release-notes.md \
            --verify-tag
